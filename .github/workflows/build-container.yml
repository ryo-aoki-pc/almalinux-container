name: Build container image from blueprint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            image_type: container
            blueprint: blueprint.toml
            main_tag: latest
            tag_suffix: ""
          - variant: minimal
            image_type: container-minimal
            blueprint: blueprint-minimal.toml
            main_tag: minimal
            tag_suffix: "-minimal"
          - variant: init
            image_type: container
            blueprint: blueprint-init.toml
            main_tag: init
            tag_suffix: "-init"
          - variant: micro
            image_type: container-micro
            blueprint: blueprint-micro.toml
            main_tag: micro
            tag_suffix: "-micro"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # The static base package set of the image type is depsolved with the
      # distro default install_weak_deps: true and the blueprint cannot
      # override it. Fetch the distro definitions matching the images
      # library linked into the image-builder binary, flip the default to
      # false, and inject them via the experimental yamldir override.
      # Blueprint packages are always depsolved without weak deps.
      - name: Prepare distro definitions with weak deps disabled
        run: |
          images_ver=$(sudo podman run --rm ghcr.io/osbuild/image-builder-cli:latest \
            version --format json | jq -r '."image-builder".dependencies.images')
          case "$images_ver" in
            *-*) ref=${images_ver##*-} ;;
            v*) ref=$images_ver ;;
            *) ref=main ;;
          esac
          echo "images library: $images_ver (checkout ref: $ref)"
          git clone --filter=blob:none https://github.com/osbuild/images.git /tmp/images-src
          git -C /tmp/images-src checkout --quiet "$ref"
          cp -r /tmp/images-src/data/distrodefs /tmp/distrodefs
          sed -i 's/install_weak_deps: true/install_weak_deps: false/' /tmp/distrodefs/rhel.yaml
          grep -n 'install_weak_deps' /tmp/distrodefs/rhel.yaml
          # Define an extra "container-micro" image type (almalinux-micro
          # equivalent): same pipeline as the container type but with the
          # smallest possible package set and no package manager. The
          # image_types mapping ends the file, so appending keeps the block
          # inside it, and the &container anchor is defined above.
          cat >> /tmp/distrodefs/rhel-10/imagetypes.yaml <<'EOF'

            container-micro:
              <<: *container
              filename: "container-micro.tar"
              package_sets:
                os:
                  - include:
                      - "bash"
                      - "coreutils-single"
                      - "glibc-minimal-langpack"
                      - "redhat-release"
                    exclude:
                      - "coreutils"
                      - "coreutils-common"
                      - "cyrus-sasl-lib"
                      - "libbrotli"
                      - "libcurl"
                      - "libevent"
                      - "libpsl"
                      - "libsemanage"
                      - "libssh"
                      - "libssh-config"
                      - "libxcrypt"
                      - "openldap"
                      - "publicsuffix-list-dafsa"
                      - "rpm-plugin-audit"
                      - "shadow-utils"
                      - "tzdata"
          EOF
          python3 -c "import yaml; yaml.safe_load(open('/tmp/distrodefs/rhel-10/imagetypes.yaml')); print('patched imagetypes.yaml OK')"

      - name: Build container image with image-builder
        run: |
          mkdir -p output
          sudo podman run --rm --privileged \
            -v "$PWD/output:/output" \
            -v "$PWD/${{ matrix.blueprint }}:/blueprint.toml:ro" \
            -v /tmp/distrodefs:/distrodefs:ro \
            -e IMAGE_BUILDER_EXPERIMENTAL=yamldir=/distrodefs \
            ghcr.io/osbuild/image-builder-cli:latest \
            build ${{ matrix.image_type }} --distro almalinux-10.2 --blueprint /blueprint.toml

      - name: Locate build output
        id: locate
        run: |
          tar_path=$(find output -name '*.tar' -type f | head -n 1)
          if [ -z "$tar_path" ]; then
            echo "no .tar image found in output/" >&2
            find output -type f >&2 || true
            exit 1
          fi
          echo "tar_path=$tar_path" >> "$GITHUB_OUTPUT"

      # image-builder leaves build-time artefacts (package-manager caches,
      # logs, temp files) in the rootfs and does not provision the empty
      # runtime files a container expects. Normalise the rootfs with buildah:
      # create the required files/directories, delete the unnecessary ones,
      # and commit a squashed single layer so the deletions actually shrink
      # the image (a plain commit would only add whiteouts). The init variant
      # also needs systemd as PID 1, which a blueprint cannot express, so its
      # OCI config is set in the same commit.
      - name: Normalize image (create required files, remove unneeded ones)
        run: |
          tar="${{ steps.locate.outputs.tar_path }}"
          ctr=$(sudo buildah from "oci-archive:$tar")
          mnt=$(sudo buildah mount "$ctr")
          echo "rootfs size before normalize:"; sudo du -sh "$mnt"

          # --- Files and directories a container image needs at runtime ---
          # Empty machine-id triggers first-boot provisioning; resolv.conf and
          # hostname are bind-mounted/populated by the container runtime.
          sudo install -m 0644 /dev/null "$mnt/etc/machine-id"
          sudo install -m 0644 /dev/null "$mnt/etc/resolv.conf"
          sudo install -m 0644 /dev/null "$mnt/etc/hostname"
          # Writable temp and runtime directories with the conventional modes.
          sudo install -d -m 1777 "$mnt/tmp" "$mnt/var/tmp"
          sudo install -d -m 0755 "$mnt/run"

          # --- Build-time artefacts with no purpose in a container image ---
          # The rpm database and dnf history are kept so the package manager
          # and vulnerability scanners keep working.
          for d in var/cache/dnf var/cache/yum var/cache/ldconfig; do
            sudo rm -rf "${mnt:?}/$d/"* 2>/dev/null || true
          done
          [ -d "$mnt/var/log" ] && sudo find "$mnt/var/log" -type f -delete 2>/dev/null || true
          sudo rm -rf "${mnt:?}/tmp/"* "${mnt:?}/var/tmp/"* "${mnt:?}/boot/"* 2>/dev/null || true

          echo "rootfs size after normalize:"; sudo du -sh "$mnt"
          sudo buildah unmount "$ctr"
          if [ "${{ matrix.variant }}" = "init" ]; then
            sudo buildah config --cmd /sbin/init --stop-signal SIGRTMIN+3 "$ctr"
          fi
          sudo rm -f "$tar"
          sudo buildah commit --squash --format oci --rm "$ctr" localhost/almalinux-normalized
          sudo skopeo copy containers-storage:localhost/almalinux-normalized "oci-archive:$tar"

      # Checks are piped to tools on the runner because the minimal image
      # does not contain grep.
      - name: Smoke test
        run: |
          sudo skopeo copy "oci-archive:${{ steps.locate.outputs.tar_path }}" \
            containers-storage:localhost/almalinux-custom:latest
          sudo podman run --rm localhost/almalinux-custom:latest cat /etc/os-release
          sudo podman run --rm localhost/almalinux-custom:latest cat /etc/os-release \
            | grep -q AlmaLinux
          sudo podman run --rm localhost/almalinux-custom:latest cat /etc/motd
          # Required runtime files were created (machine-id present and empty).
          sudo podman run --rm localhost/almalinux-custom:latest sh -c \
            'test -f /etc/machine-id && test ! -s /etc/machine-id && test -f /etc/resolv.conf && test -d /tmp'
          # Unnecessary build artefacts were removed.
          sudo podman run --rm localhost/almalinux-custom:latest sh -c \
            '! ls -A /var/cache/dnf 2>/dev/null | grep -q . && ! ls -A /boot 2>/dev/null | grep -q .'
          # The micro image has no package manager (no dnf.conf, no rpm).
          if [ "${{ matrix.variant }}" != "micro" ]; then
            sudo podman run --rm localhost/almalinux-custom:latest cat /etc/dnf/dnf.conf \
              | grep -q '^install_weak_deps=False'
            echo "installed package count:"
            sudo podman run --rm localhost/almalinux-custom:latest rpm -qa | wc -l
          fi

      - name: Boot test (init variant)
        if: matrix.variant == 'init'
        run: |
          sudo podman inspect \
            --format 'Cmd={{.Config.Cmd}} StopSignal={{.Config.StopSignal}}' \
            localhost/almalinux-custom:latest | tee /tmp/inspect.txt
          grep -q '/sbin/init' /tmp/inspect.txt
          sudo podman run -d --name init-test localhost/almalinux-custom:latest
          state=""
          for _ in $(seq 1 30); do
            state=$(sudo podman exec init-test systemctl is-system-running 2>/dev/null || true)
            case "$state" in running|degraded) break ;; esac
            sleep 1
          done
          echo "systemd state: $state"
          sudo podman exec init-test systemctl list-units --failed --no-legend || true
          sudo podman rm -f init-test
          case "$state" in running|degraded) exit 0 ;; *) exit 1 ;; esac

      - name: Lint container image with dockle
        run: |
          sudo skopeo copy "oci-archive:${{ steps.locate.outputs.tar_path }}" \
            "docker-archive:/tmp/dockle-input.tar:localhost/almalinux-custom:ci"
          # CIS-DI-0001 (non-root USER): this is a base OS image like the
          # official almalinux image; derived images are expected to set USER.
          sudo podman run --rm \
            -v /tmp/dockle-input.tar:/input.tar:ro \
            goodwithtech/dockle:latest \
            --exit-code 1 --exit-level warn \
            --ignore CIS-DI-0001 \
            --input /input.tar

      - name: Upload container image artifact
        uses: actions/upload-artifact@v6
        with:
          name: almalinux-custom-container${{ matrix.tag_suffix }}
          path: ${{ steps.locate.outputs.tar_path }}
          if-no-files-found: error

      - name: Push to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          image="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tag="${{ matrix.main_tag }}"
          else
            tag="$(echo '${{ github.ref_name }}' | tr '/' '-')${{ matrix.tag_suffix }}"
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo skopeo login ghcr.io \
            --username "${{ github.actor }}" --password-stdin
          sudo skopeo copy "oci-archive:${{ steps.locate.outputs.tar_path }}" \
            "docker://$image:$tag"
          echo "Pushed $image:$tag"
